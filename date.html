<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date</title>
    <link rel="stylesheet" href="css/date.css" />
    <script>
      function validateDate(event) {
        const dateInput = document.getElementById("dateInput").value;
        if (!dateInput) {
          alert("Please select a valid date.");
          event.preventDefault(); // Prevent form submission
        }
      }
    </script>
  </head>
  <body>
    <h1 title="choose a date">Are you free on ...</h1>
    <form class="form-group">
      
      <div>
        <input
          type="date"
          id="dateInput"
          min="2026-04-12"
          max="2026-04-12"
          required
        />
        <br><label>Too bad you've got no other options babe😋</label><br>
        <button class="button" type="submit" formaction="food.html" onclick="validateDate(event)">
          Submit
        </button>
      </div>
    </form>
  </body>
</html>
