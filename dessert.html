<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dessert</title>
    <link rel="stylesheet" href="css/dessert.css">
</head>
<body>
    <div id="dessertquestion">Desserts ku enna panlaa🧐✍🏽</div>

    <div class="dessert-selection">
        <div class="dessert-item">
            <img src="food/coffee.jpeg" alt="coffee">
            <label><input type="checkbox" name="dessert" value="coffee">coffee and dum(Red obv)</label>
        </div>
        <div class="dessert-item">
            <img src="food/softies.jpeg" alt="softies">
            <label><input type="checkbox" name="dessert" value="softies"> softies</label>
        </div>
        <div class="dessert-item">
            <img src="food/icecream.jpeg" alt="ice cream">
            <label><input type="checkbox" name="dessert" value="ice cream"> ice cream</label>
        </div>
    </div>

    <button class="button" onclick="sendDessertSelection()">Continue</button>

    <script>
        function sendDessertSelection() {
            let selectedDesserts = [];
            document.querySelectorAll('input[name="dessert"]:checked').forEach((checkbox) => {
                selectedDesserts.push(checkbox.value);
            });

            const emailData = {
                service_id: "service_bqjg0qi",
                template_id: "template_xpnls3n",
                user_id: "WxCXlNRViNJxx243N",
                template_params: {
                    "to_name": "Vishal",
                    "from_name": "Harshita",
                    "desserts": selectedDesserts.join(", ")
                }
            };

            console.log("Sending email data:", emailData);

            fetch("https://api.emailjs.com/api/v1.0/email/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(emailData)
            })
            .then(response => {
                console.log("Response status:", response.status);
                if (response.ok) {
                    alert("Your dessert selection has been sent!");
                    window.location.href = "lastpage.html";
                } else {
                    response.text().then(text => {
                        console.error("Error response:", text);
                        alert("Error sending selection. Status: " + response.status);
                    });
                }
            })
            .catch(error => {
                console.error("Fetch error:", error);
                alert("Failed to send email. Please try again.");
            });
        }
    </script>

</body>
</html>
