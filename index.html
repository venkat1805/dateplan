<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Invitation</title>
    <link rel="stylesheet" href="css/datenight.css" />
  </head>
  <body>
    <div class="flower-container"><img src="flower.png" class="flower-image"/><p class="hey-cutie">hey cutie</p></div>
    <div id="dateQuestion"><b>Leah, would you like to go on a date with me?</b></div>
    <button class="answerButton" onclick="location.href='thankyou.html'">
      Yes 
    </button>
    <button class="answerButton" id="noButton">Nah im good</button>
    <br />
    <img src="cat.gif" alt="cat asking question" class="responsive" />
    <script>
      document
        .getElementById("noButton")
        .addEventListener("click", function () {
          var yesButton = document.querySelector(
            'button[onclick*="thankyou.html"]'
          );
          var currentFontSize = parseInt(
            window.getComputedStyle(yesButton).fontSize
          );
          yesButton.style.fontSize = currentFontSize + 10 + "px"; 
        });
    </script>
  </body>
</html>
