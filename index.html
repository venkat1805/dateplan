<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Invitation</title>
    <link rel="stylesheet" href="css/datenight.css" />
  </head>
  <body>
    <div><p class="hey-cutie">Hiii😙</p></div>
    <div id="dateQuestion"><b>M'lady, so Ive been wanting to ask you something for a while now..</b></div>
    <div id="dateQuestion"><b>Would you be interested in hearing me out?</b></div>
    
    <button class="answerButton" onclick="location.href='askherout.html'">
      Yes 
    </button>
    <button class="answerButton" id="noButton">Nah im good</button>
    <br />
    <img 
      src="https://media.giphy.com/media/6Azx1QoKCCYkPtyl1N/giphy.gif" 
      class="responsive" 
    />
    <script>
      document
        .getElementById("noButton")
        .addEventListener("click", function () {
          var yesButton = document.querySelector(
            'button[onclick*="askherout.html"]'
          );
          var currentFontSize = parseInt(
            window.getComputedStyle(yesButton).fontSize
          );
          yesButton.style.fontSize = currentFontSize + 10 + "px"; 
        });
    </script>
  </body>
</html>
